site_name: Brando – Brand-as-Code
site_description: Brando Schema is the documentation site for document-based entity types authored as a Markdown, YAML, and JSON triad.
site_author: Jonathan Bowker
site_url: https://brandoschema.com
repo_url: https://github.com/JonathanBowker/brandoschema
repo_name: GitHub

theme:
  name: material
  custom_dir: overrides
  logo: assets/images/4x/masthead_logo@4x.png
  favicon: assets/images/favicon.svg
  palette:
    - scheme: default
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - content.code.copy
    - content.code.wrap
    - content.headings.anchor
    - header.autohide
    - navigation.expand
  icons:
    - material: true
    - fontawesome: true
    - octicons: true
  language: en

plugins:
  - search
  - tags
  - copy-well-known

extra:
  analytics:
    provider: google
    property: G-3N8RPPP7CD
  custom_domain: brandoschema.com
  include:
    - data/brando-schema.json
  meta_defaults:
    keywords: brandoschema, brando schema, markdown yaml json triad, document entity types

extra_css:
  - css/custom.css
  - css/styles.css

extra_javascript:
  - js/nav-depth.js
  - js/smooth-scroll.js
  - https://d3js.org/d3.v7.min.js
  - js/linked_map.js
  - js/modal.js

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.tasklist
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tilde
  - pymdownx.magiclink
  - pymdownx.inlinehilite
  - pymdownx.extra
  - md_in_html
  - meta

nav:
  - Home: index.md
  - Getting started:
      - Overview: getting-started.md
      - Quickstart (Markdown): getting-started-markdown.md
      - Quickstart (YAML): getting-started-yaml.md
      - Quickstart (JSON): getting-started-jsonld.md
  - Entity Types:
      - Overview: entity-types/index.md
      - Strategy and planning:
          - Market report: entity-types/strategy-and-planning/market-report.md
          - Campaign strategy: entity-types/strategy-and-planning/campaign-strategy.md
          - Benchmark example: entity-types/strategy-and-planning/benchmark-example.md
      - Marketing and messaging:
          - Approved example: entity-types/marketing-and-messaging/approved-example.md
          - Discouraged example: entity-types/marketing-and-messaging/discouraged-example.md
          - Prohibited example: entity-types/marketing-and-messaging/prohibited-example.md
      - Claims and disclosures:
          - Product claim: entity-types/claims-and-disclosures/product-claim.md
          - Regulatory disclosure: entity-types/claims-and-disclosures/regulatory-disclosure.md
          - Sustainability statement: entity-types/claims-and-disclosures/sustainability-statement.md
      - Evidence and governance:
          - Evidence record: entity-types/evidence-and-governance/evidence-record.md
          - Audit record: entity-types/evidence-and-governance/audit-record.md
          - Source document: entity-types/evidence-and-governance/source-document.md
  - Properties:
      - All properties: properties/index.md
      - JSON sidecar link: properties/jsonLdSidecar.md
      - Brand & context: properties/brand-and-context.md
      - Expression tokens: properties/expression.md
      - Governance & policy: properties/governance.md
      - Product & category: properties/product-and-category.md
      - Runtime & campaigns: properties/runtime-and-campaign.md
      - Shared properties: properties/cross-type.md
  - About:
      - About Brando Schema: about.md
      - How to use: how-to-use.md
      - FAQ: faq.md
      - Partners: partner.md
      - Terms: terms.md
